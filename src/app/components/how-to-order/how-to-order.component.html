<section class="order-section" id="order">
  <div class="section-inner">
    <p class="section-tag">⬡ How to Order</p>
    <h2 class="section-title">Order in 3 Easy Steps</h2>
    <div class="section-divider"></div>

    <div class="steps">
      @for (step of steps; track step.num; let last = $last) {
        <div class="step">
          <div class="step-num">{{ step.num }}</div>
          <h4>{{ step.title }}</h4>
          <p>{{ step.description }}</p>
        </div>
        @if (!last) {
          <div class="step-arrow">›</div>
        }
      }
    </div>

    <div class="contact-btns">
      <button class="fb-btn" (click)="openMessenger()">
        <svg class="fb-icon" viewBox="0 0 24 24">
          <path d="M12 2.04C6.5 2.04 2 6.53 2 12.06C2 17.06 5.66 21.21 10.44 21.96V14.96H7.9V12.06H10.44V9.85C10.44 7.34 11.93 5.96 14.22 5.96C15.31 5.96 16.45 6.15 16.45 6.15V8.62H15.19C13.95 8.62 13.56 9.39 13.56 10.18V12.06H16.34L15.89 14.96H13.56V21.96A10 10 0 0 0 22 12.06C22 6.53 17.5 2.04 12 2.04Z"/>
        </svg>
        Message Us on Facebook
      </button>

      <!-- <button class="tt-btn" (click)="openTiktok()">
        <svg class="tt-icon" viewBox="0 0 24 24">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
        </svg>
        Order on TikTok
      </button> -->
    </div>
  </div>
</section>
