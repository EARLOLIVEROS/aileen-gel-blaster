<section class="hero" id="home">
  <div class="hero-bg">
    <img src="/1.jpg" alt="" />
  </div>
  <div class="hero-scan"></div>
  <div class="hero-watermark" aria-hidden="true">GB</div>

  <div class="hero-content">
    <div class="hero-tag">⬡ Welcome to Your Tactical Playground</div>
    <h1 class="hero-title">
      AILEEN<br>
      <span class="accent">GEL</span> BLASTER
    </h1>
    <p class="hero-sub">Locked. Loaded. Ready to Ship.</p>
    <p class="hero-desc">
      Everything you need in one place — premium gel blasters, ammo, and gear for those who don’t play around.
    </p>
    <div class="hero-btns">
      <button class="btn-primary" (click)="scrollTo('featured')">Browse Products</button>
      <button class="btn-outline" (click)="scrollTo('order')">Order via Messenger</button>
    </div>
    <div class="hero-stats">
      @for (stat of stats; track stat.label) {
        <div class="stat">
          <div class="stat-num">{{ stat.num }}</div>
          <div class="stat-label">{{ stat.label }}</div>
        </div>
      }
    </div>
  </div>
</section>
